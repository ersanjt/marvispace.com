  <link rel="stylesheet" href="/assets/css/fonts.css" />
  <link rel="stylesheet" href="/assets/css/cart-ui.css" />

</head>
<body>
  <!-- MARVISPACE Storefront · Developed by Ersan JT — https://github.com/ersanjt -->

  <!-- ═══ HEADER ═══ -->
  <header class="site-nav" role="banner">
    <button
      class="menu-btn"
      id="menuBtn"
      aria-label="Toggle grid density"
      data-grid="dense"
      data-preview="false"
      data-zoom="0"
    >
      <span class="menu-line menu-line-1" aria-hidden="true">
        <span class="menu-plus">+</span>
      </span>
      <span class="menu-line menu-line-2" aria-hidden="true">
        <span class="menu-minus"></span>
      </span>
      <span class="back-arrow" aria-hidden="true">‹</span>
    </button>

    <div class="brand" aria-label="MARVISPACE">
      <h1 class="visually-hidden">MARVISPACE — Premium Leather Apparel Online Store</h1>
      <span class="brand-mark" aria-hidden="true">MARVISPACE</span>
    </div>

    <div class="nav-right" id="navRight">
      <button class="wallet-btn" aria-label="Wallet">WALLET</button>
      <button class="cart-btn" id="cartBtn" aria-label="Cart">
        <span class="cart-count" id="cartCount">0</span>
        <svg class="cart-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none">
          <path d="M7 9h10l-1.2 9H8.2L7 9Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
          <path d="M9 9V7a3 3 0 0 1 6 0v2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- nav spacer -->
  <div class="nav-spacer" id="navSpacer"></div>

  <!-- ═══ CART DRAWER ═══ -->
  <aside class="cart-drawer" id="cartDrawer" aria-hidden="true" aria-label="Shopping cart">
    <div class="cart-header">
      <button class="cart-close" id="cartClose" aria-label="Close cart">‹</button>
    </div>

    <div class="cart-body">
      <h2 class="cart-summary-heading">Order Summary</h2>
      <div class="cart-lines" id="cartItems">
        <div class="cart-empty" id="cartEmpty">
          <p class="cart-empty-msg">Your cart is empty</p>
        </div>
      </div>

      <div class="cart-summary" id="cartFooter" hidden>
        <div id="cartTotals"></div>
        <button type="button" class="cart-discount-link" id="cartDiscountToggle">MARVISPACE code</button>
        <div class="cart-discount-form" id="cartDiscountForm" hidden>
          <input type="text" id="cartDiscountInput" placeholder="Enter code" aria-label="Discount code" />
          <button type="button" id="cartDiscountApply">Apply</button>
        </div>
        <button class="checkout-btn" type="button" id="checkoutBtn">Checkout</button>
      </div>
    </div>
  </aside>
  <div class="cart-overlay" id="cartOverlay"></div>

  <!-- ═══ MAIN ═══ -->
  <main class="page" id="page">

    <!-- Filters -->
    <nav class="filters" aria-label="Product filters" id="filters">
      <div class="filter-row">
        <button class="f-btn active" data-filter="new">NEW</button>
        <button class="f-btn" data-filter="mens">MENS</button>
        <button class="f-btn" data-filter="womens">WOMENS</button>
      </div>
      <div class="filter-row">
        <button class="f-btn" data-filter="jackets">JACKETS</button>
        <button class="f-btn" data-filter="coats">COATS</button>
        <button class="f-btn" data-filter="shirts">SHIRTS</button>
      </div>
      <div class="filter-row">
        <button class="f-btn" data-filter="accessories">ACCESSORIES</button>
        <button class="f-btn" data-filter="bottoms">BOTTOMS</button>
      </div>
    </nav>

    <!-- Product grid -->
    <section class="product-grid" id="productGrid" aria-live="polite" aria-label="Product catalog"></section>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="footer-inner">
        <ul class="footer-nav">
          <li><a href="/contact" class="nav-item">Contact</a></li>
          <li><a href="/terms" class="nav-item">Terms</a></li>
          <li><a href="/privacy" class="nav-item">Privacy</a></li>
          <li><a href="/accessibility" class="nav-item">Accessibility</a></li>
          <li><a href="/privacy-right-center" class="nav-item">DNSMPI</a></li>
          <li><button type="button" class="nav-item" data-cookies-btn>Cookies</button></li>
          <li><a href="/order-status" class="nav-item">Order Status</a></li>
        </ul>
      </div>
    </footer>

  </main>

  <!-- ═══ PRODUCT PREVIEW ═══ -->
  <div class="preview" id="preview" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Product detail">

    <button class="p-nav p-prev" id="pPrev" aria-label="Previous product">
      <svg class="p-nav-icon" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" width="32" height="32" viewBox="0 0 24 24">
        <g transform="rotate(-90 12 12)">
          <path fill="currentColor" d="M11.29 8.71L6.7 13.3a.996.996 0 1 0 1.41 1.41L12 10.83l3.88 3.88a.996.996 0 1 0 1.41-1.41L12.7 8.71a.996.996 0 0 0-1.41 0"></path>
        </g>
      </svg>
    </button>
    <button class="p-nav p-next" id="pNext" aria-label="Next product">
      <svg class="p-nav-icon" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" width="32" height="32" viewBox="0 0 24 24">
        <g transform="rotate(90 12 12)">
          <path fill="currentColor" d="M11.29 8.71L6.7 13.3a.996.996 0 1 0 1.41 1.41L12 10.83l3.88 3.88a.996.996 0 1 0 1.41-1.41L12.7 8.71a.996.996 0 0 0-1.41 0"></path>
        </g>
      </svg>
    </button>

    <div class="preview-stack">
      <div class="fly-in" id="flyIn">
        <div class="preview-img-shell">
          <div class="img-mover" id="imgMover">
            <div class="pinch-wrap" id="pinchWrap">
              <div class="img-square" id="imgSquare"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="preview-dots" id="previewDots" role="tablist" aria-label="Product images"></div>

      <div class="preview-meta" id="previewMeta">
        <span class="p-name" id="pName"></span>
        <span class="p-price" id="pPrice"></span>
        <button class="p-add" id="pAdd" type="button" aria-label="Add to cart">+</button>
      </div>
    </div>

    <!-- size selector -->
    <div class="size-panel" id="sizePanel">
      <div class="size-panel-inner" id="sizePanelInner">

        <div class="sz-head">
          <div class="sz-head-row">
            <button class="sz-help" id="szHelp" type="button" aria-label="Size guide">
              <svg width="11" height="15" viewBox="0 0 11 15" fill="none">
                <path d="M5.5 8L5.5 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M1.5 4.5C1.5 2 4 1 5.5 1C7 1 9.5 2 9.5 4.5C9.5 7 6 8 5.5 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M5.5 13.5C5.36 13.5 5.25 13.39 5.25 13.25C5.25 13.11 5.36 13 5.5 13" stroke="currentColor" stroke-width="2"/>
                <path d="M5.5 13.5C5.64 13.5 5.75 13.39 5.75 13.25C5.75 13.11 5.64 13 5.5 13" stroke="currentColor" stroke-width="2"/>
              </svg>
            </button>
            <button class="sz-clear" id="szClear" type="button" aria-label="Clear size" disabled>
              <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round">
                <line x1="14" y1="14" x2="34" y2="34"/>
                <line x1="14" y1="34" x2="34" y2="14"/>
              </svg>
            </button>
          </div>

          <div class="sz-name-track">
            <div class="sz-stack" id="szNameStack">
              <div class="sz-slot"><span id="szNameTxt">SELECT SIZE</span></div>
              <div class="sz-slot"><span>ADDING</span></div>
            </div>
          </div>

          <div class="sz-price-track">
            <div class="sz-stack" id="szPriceStack">
              <div class="sz-slot"><span id="szPriceTxt"></span></div>
              <div class="sz-slot"><span>RESTOCKS IN 4 WEEKS</span></div>
            </div>
          </div>
        </div>

        <div class="sz-grid-wrap">
          <div class="sz-add-wrap">
            <button class="sz-add-btn" id="szAdd" type="button" aria-label="Confirm size">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </button>
          </div>
          <div class="sz-grid" id="szGrid"></div>
        </div>

        <p class="p-desc" id="pDesc"></p>

      </div>
    </div>

  </div>

  <script type="module" src="/assets/js/pages/home.js"></script>
</body>
</html>

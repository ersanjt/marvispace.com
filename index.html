<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MARVISPACE | Premium Footwear &amp; Apparel — marvispace.com</title>
  <meta name="description" content="Shop minimalist footwear, slides, apparel and accessories at MARVISPACE. New arrivals for men and women — premium design, curated collections, secure checkout at marvispace.com." />
  <meta name="keywords" content="MARVISPACE, marvispace.com, footwear, slides, mens fashion, womens fashion, minimalist store, online shop, sneakers, boots, accessories" />
  <meta name="author" content="MARVISPACE" />
  <meta name="robots" content="index, follow, max-image-preview:large" />
  <link rel="canonical" href="https://marvispace.com/" />
  <meta name="theme-color" content="#f6f6f5" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="MARVISPACE" />
  <meta property="og:title" content="MARVISPACE | Premium Footwear &amp; Apparel" />
  <meta property="og:description" content="Shop minimalist footwear, slides, apparel and accessories at MARVISPACE. New arrivals for men and women at marvispace.com." />
  <meta property="og:url" content="https://marvispace.com/" />
  <meta property="og:image" content="https://cdn.swell.store/yzy-prod/694f03180da1910012a0e97c/205872b9cd6ca8619e84f61f025e115a/SL-03-BLACK-1.png" />
  <meta property="og:locale" content="en_US" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="MARVISPACE | Premium Footwear &amp; Apparel" />
  <meta name="twitter:description" content="Shop minimalist footwear, slides, apparel and accessories at MARVISPACE — marvispace.com" />
  <meta name="twitter:image" content="https://cdn.swell.store/yzy-prod/694f03180da1910012a0e97c/205872b9cd6ca8619e84f61f025e115a/SL-03-BLACK-1.png" />

  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/favicon.svg" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "https://marvispace.com/#organization",
        "name": "MARVISPACE",
        "url": "https://marvispace.com/",
        "logo": "https://marvispace.com/favicon.svg",
        "sameAs": []
      },
      {
        "@type": "WebSite",
        "@id": "https://marvispace.com/#website",
        "url": "https://marvispace.com/",
        "name": "MARVISPACE",
        "description": "Minimalist online store for premium footwear, apparel and accessories.",
        "publisher": { "@id": "https://marvispace.com/#organization" },
        "inLanguage": "en"
      },
      {
        "@type": "ClothingStore",
        "@id": "https://marvispace.com/#store",
        "name": "MARVISPACE",
        "url": "https://marvispace.com/",
        "image": "https://cdn.swell.store/yzy-prod/694f03180da1910012a0e97c/205872b9cd6ca8619e84f61f025e115a/SL-03-BLACK-1.png",
        "priceRange": "$$",
        "currenciesAccepted": "USD",
        "paymentAccepted": "Credit Card, PayPal, Apple Pay, Google Pay"
      }
    ]
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ═══ HEADER ═══ -->
  <header class="site-nav" role="banner">
    <button
      class="menu-btn"
      id="menuBtn"
      aria-label="Toggle grid density"
      data-grid="dense"
      data-preview="false"
      data-zoom="0"
    >
      <span class="menu-line menu-line-1" aria-hidden="true">
        <span class="menu-plus">+</span>
      </span>
      <span class="menu-line menu-line-2" aria-hidden="true">
        <span class="menu-minus"></span>
      </span>
      <span class="back-arrow" aria-hidden="true">‹</span>
    </button>

    <div class="brand" aria-label="MARVISPACE">
      <h1 class="visually-hidden">MARVISPACE — Premium Footwear and Apparel Online Store</h1>
      <span class="brand-mark" aria-hidden="true">MARVISPACE</span>
    </div>

    <div class="nav-right" id="navRight">
      <button class="wallet-btn" aria-label="Wallet">WALLET</button>
      <button class="cart-btn" id="cartBtn" aria-label="Cart">
        <span class="cart-count" id="cartCount">0</span>
        <svg class="cart-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none">
          <path d="M7 9h10l-1.2 9H8.2L7 9Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
          <path d="M9 9V7a3 3 0 0 1 6 0v2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- nav spacer -->
  <div class="nav-spacer" id="navSpacer"></div>

  <!-- ═══ CART DRAWER ═══ -->
  <aside class="cart-drawer" id="cartDrawer" aria-hidden="true" aria-label="Shopping cart">
    <div class="cart-header">
      <button class="cart-close" id="cartClose" aria-label="Close cart">‹</button>
    </div>

    <div class="cart-body">
      <div class="cart-items" id="cartItems">
        <div class="cart-empty" id="cartEmpty">
          <p>YOUR CART IS EMPTY</p>
        </div>
      </div>

      <div class="cart-summary" id="cartFooter" hidden>
        <div class="cart-summary-row">
          <span>SUBTOTAL</span>
          <span id="cartSubtotal">$0.00</span>
        </div>
        <div class="cart-summary-row">
          <span>SHIPPING</span>
          <span class="cart-muted">CALCULATED AT NEXT STEP</span>
        </div>
        <div class="cart-summary-row">
          <span>TAXES</span>
          <span id="cartTaxes">$0.00</span>
        </div>
        <div class="cart-summary-row cart-summary-total">
          <span>TOTAL</span>
          <span class="cart-total-price" id="cartTotalPrice">$0.00</span>
        </div>
        <button class="checkout-btn" type="button" id="checkoutBtn">CHECKOUT</button>
      </div>
    </div>
  </aside>
  <div class="cart-overlay" id="cartOverlay"></div>

  <!-- ═══ MAIN ═══ -->
  <main class="page" id="page">

    <!-- Filters -->
    <nav class="filters" aria-label="Product filters" id="filters">
      <div class="filter-row">
        <button class="f-btn active" data-filter="new">NEW</button>
        <button class="f-btn" data-filter="mens">MENS</button>
        <button class="f-btn" data-filter="womens">WOMENS</button>
      </div>
      <div class="filter-row">
        <button class="f-btn" data-filter="footwear">FOOTWEAR</button>
        <button class="f-btn" data-filter="accessories">ACCESSORIES</button>
      </div>
      <div class="filter-row">
        <button class="f-btn" data-filter="slides">SLIDES</button>
      </div>
    </nav>

    <!-- Product grid -->
    <section class="product-grid" id="productGrid" aria-live="polite" aria-label="Product catalog"></section>

    <!-- Footer links -->
    <footer class="site-footer">
      <ul class="footer-list">
        <li><a href="#" class="foot-link">CONTACT</a></li>
        <li><a href="#" class="foot-link">TERMS</a></li>
        <li><a href="#" class="foot-link">PRIVACY</a></li>
        <li><a href="#" class="foot-link">ACCESSIBILITY</a></li>
        <li><button class="foot-link">COOKIES</button></li>
        <li><a href="#" class="foot-link">ORDER STATUS</a></li>
      </ul>
    </footer>

  </main>

  <!-- ═══ PRODUCT PREVIEW ═══ -->
  <div class="preview" id="preview" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Product detail">

    <button class="p-nav p-prev" id="pPrev" aria-label="Previous product">‹</button>
    <button class="p-nav p-next" id="pNext" aria-label="Next product">›</button>

    <div class="preview-stack">
      <div class="fly-in" id="flyIn">
        <div class="preview-img-shell">
          <div class="img-mover" id="imgMover">
            <div class="pinch-wrap" id="pinchWrap">
              <div class="img-square" id="imgSquare"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="preview-dots" id="previewDots" role="tablist" aria-label="Product images"></div>

      <div class="preview-meta" id="previewMeta">
        <span class="p-name" id="pName"></span>
        <span class="p-price" id="pPrice"></span>
        <button class="p-add" id="pAdd" type="button" aria-label="Add to cart">+</button>
      </div>
    </div>

    <!-- size selector -->
    <div class="size-panel" id="sizePanel">
      <div class="size-panel-inner" id="sizePanelInner">

        <div class="sz-head">
          <div class="sz-head-row">
            <button class="sz-help" id="szHelp" type="button" aria-label="Size guide">
              <svg width="11" height="15" viewBox="0 0 11 15" fill="none">
                <path d="M5.5 8L5.5 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M1.5 4.5C1.5 2 4 1 5.5 1C7 1 9.5 2 9.5 4.5C9.5 7 6 8 5.5 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M5.5 13.5C5.36 13.5 5.25 13.39 5.25 13.25C5.25 13.11 5.36 13 5.5 13" stroke="currentColor" stroke-width="2"/>
                <path d="M5.5 13.5C5.64 13.5 5.75 13.39 5.75 13.25C5.75 13.11 5.64 13 5.5 13" stroke="currentColor" stroke-width="2"/>
              </svg>
            </button>
            <button class="sz-clear" id="szClear" type="button" aria-label="Clear size" disabled>
              <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round">
                <line x1="14" y1="14" x2="34" y2="34"/>
                <line x1="14" y1="34" x2="34" y2="14"/>
              </svg>
            </button>
          </div>

          <div class="sz-name-track">
            <div class="sz-stack" id="szNameStack">
              <div class="sz-slot"><span id="szNameTxt">SELECT SIZE</span></div>
              <div class="sz-slot"><span>ADDING</span></div>
            </div>
          </div>

          <div class="sz-price-track">
            <div class="sz-stack" id="szPriceStack">
              <div class="sz-slot"><span id="szPriceTxt"></span></div>
              <div class="sz-slot"><span>RESTOCKS IN 4 WEEKS</span></div>
            </div>
          </div>
        </div>

        <div class="sz-grid-wrap">
          <div class="sz-add-wrap">
            <button class="sz-add-btn" id="szAdd" type="button" aria-label="Confirm size">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </button>
          </div>
          <div class="sz-grid" id="szGrid"></div>
        </div>

        <p class="p-desc" id="pDesc"></p>

      </div>
    </div>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>

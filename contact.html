<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — MARVISPACE</title>
  <meta name="description" content="Contact MARVISPACE for order support, product questions, and customer service at marvispace.com." />
  <link rel="canonical" href="https://marvispace.com/contact" />
  <meta name="robots" content="index, follow" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/fonts.css" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <link rel="stylesheet" href="/assets/css/page.css" />
  <link rel="stylesheet" href="/assets/css/footer.css" />
</head>
<body>
  <header class="site-page-nav">
    <a href="/">‹ MARVISPACE</a>
    <a href="/checkout">Cart</a>
  </header>
  <main class="site-page">
    <h1>Contact</h1>
    <p>For order support and product inquiries, email <strong>support@marvispace.com</strong> or use the form below.</p>

    <form class="page-form" id="contactForm" action="mailto:support@marvispace.com" method="post" enctype="text/plain">
      <label>
        <span>Name</span>
        <input type="text" name="name" required autocomplete="name" />
      </label>
      <label>
        <span>Email</span>
        <input type="email" name="email" required autocomplete="email" />
      </label>
      <label>
        <span>Message</span>
        <input type="text" name="message" required />
      </label>
      <button type="submit" class="page-btn">Send message</button>
    </form>

    <p class="page-note">We respond within 1–2 business days.</p>
    <a class="back-shop" href="/">← Back to shop</a>
  </main>
  <footer data-site-footer></footer>
  <script type="module" src="/assets/js/core/credits.js"></script>
</body>
</html>
